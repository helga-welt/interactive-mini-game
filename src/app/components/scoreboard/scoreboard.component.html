<div class="scoreboard">
    <div class="player-side">
        <div class="avatar player">👨‍💼</div>
        <div class="info">
            <span class="label">PLAYER</span>
            <span class="score">{{ gameService.playerScore() }}</span>
        </div>
    </div>
    <div class="vs">VS</div>
    <div class="computer-side">
        <div class="info">
            <span class="label computer-label">COMPUTER</span>
            <span class="score computer-score">{{ gameService.computerScore() }}</span>
        </div>
        <div class="avatar computer">🖥️</div>
    </div>
</div>
