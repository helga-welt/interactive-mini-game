@if (gameService.winner(); as winner) {
    <div class="overlay">
        <div class="modal">
            <div class="trophy">🏆</div>
            <h2>{{ winner }} Wins!</h2>
            <p class="subtitle">Congratulations!</p>

            <div class="score">
                <div class="score-item player">
                    <span class="label">Player</span>
                    <span class="value">{{ gameService.playerScore() }}</span>
                </div>
                <div class="divider">:</div>
                <div class="score-item computer">
                    <span class="label">Computer</span>
                    <span class="value">{{ gameService.computerScore() }}</span>
                </div>
            </div>

            <div class="actions">
                <button
                        class="restart-btn"
                        (click)="gameService.restart()">
                    Play Again
                </button>
                <button
                        class="close-btn"
                        (click)="gameService.closeResult()">
                    Close
                </button>
            </div>
        </div>
    </div>
}
