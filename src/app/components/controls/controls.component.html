<div class="controls">
    <div class="input-group">
        <label for="timeout">Timeout (ms)</label>
        <input
                id="timeout"
                type="number"
                min="100"
                step="100"
                [disabled]="gameService.isRunning()"
                [ngModel]="timeout()"
                (ngModelChange)="timeout.set($event)" />
    </div>

    <button
            class="start-btn"
            [disabled]="gameService.isRunning()"
            (click)="startGame()">
        <span class="icon">▶</span>
        <span>Start Game</span>
    </button>
</div>
